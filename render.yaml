# Render Blueprint. Powers the "Deploy to Render" button in
# deploy/render/README.md.
#
# What this provisions:
#   - postgres        managed Postgres
#   - web             web service, this repo
#   - worker          background worker, this repo
#
# You bring:
#   - LITELLM_API_BASE, LITELLM_API_KEY  (any OpenAI-compatible
#                                          /chat/completions endpoint)
#   - KUBE_CONFIG_B64, K8S_NODE_HOST, K8S_HARNESS_IMAGE
#                                        (your sandbox cluster — run
#                                          bin/eks-up.sh or bin/gke-up.sh)
#
# Sandbox cluster is OUT OF SCOPE — Render does not host k8s. See
# deploy/render/README.md.

databases:
  - name: litellm-agents-postgres
    plan: starter
    postgresMajorVersion: 16

services:
  - type: web
    name: litellm-agents-web
    runtime: node
    plan: starter
    # `--include=dev` is critical: NODE_ENV=production below makes
    # `npm ci` skip devDependencies by default, which then breaks
    # `next build` (Tailwind / Turbopack devDeps).
    # `bin/install-aws-iam-authenticator.sh` drops the binary at
    # ./bin/aws-iam-authenticator — required at runtime by the EKS
    # exec-plugin kubeconfig that `bin/eks-up.sh` emits.
    buildCommand: bash bin/install-aws-iam-authenticator.sh && npm ci --include=dev && npx prisma generate && npm run build
    # `npx prisma migrate deploy` runs on the same Postgres advisory lock
    # the running web replica holds (during a hot deploy). On the
    # default 10s timeout that races and fails the pre-deploy. We're
    # using `prisma db push` semantics anyway (`prisma/migrations/` is
    # empty), so the bake is unnecessary on every deploy.
    # Run `npx prisma db push --accept-data-loss --skip-generate` once
    # locally when the schema changes; deploys carry the existing schema.
    startCommand: |
      set -e
      export PATH="$PWD/bin:$PATH"
      if [ -n "$KUBE_CONFIG_B64" ]; then
        echo "$KUBE_CONFIG_B64" | base64 -d > /tmp/kubeconfig
        export KUBECONFIG=/tmp/kubeconfig
      fi
      npm start
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: litellm-agents-postgres
          property: connectionString
      - key: MASTER_KEY
        generateValue: true
      - key: UI_USERNAME
        value: admin
      # OpenAI-compatible /chat/completions endpoint and key. LiteLLM
      # Cloud, your own LiteLLM proxy, or any compatible gateway works.
      - key: LITELLM_API_BASE
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_DEFAULT_MODEL
        value: anthropic/claude-sonnet-4-6
      - key: PREINSTALLED_GITHUB_REPO
        value: https://github.com/BerriAI/litellm
      # Sandbox cluster — see bin/eks-up.sh / bin/gke-up.sh. The kubeconfig
      # produced by bin/eks-up.sh authenticates to EKS via aws-iam-authenticator
      # at request time, so the AWS_* env vars below are required for the
      # exec-plugin to mint a token on each k8s API call.
      - key: KUBE_CONFIG_B64
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      # Platform discovers any Ready node ExternalIP via the apiserver
      # at spawn time (30s cache) when set to "auto". Pinning a single
      # node IP breaks every nodegroup scale or node replacement.
      - key: K8S_NODE_HOST
        value: auto
      - key: K8S_HARNESS_IMAGE
        sync: false
      - key: K8S_NAMESPACE
        value: default
      - key: K8S_NODEPORT_MIN
        value: "30000"
      - key: K8S_NODEPORT_MAX
        value: "30099"
      - key: K8S_IMAGE_PULL_POLICY
        value: IfNotPresent
      - key: WARM_POOL_SIZE
        value: "2"

  - type: worker
    name: litellm-agents-worker
    runtime: node
    plan: starter
    # `--include=dev` mirrors the web service — tsx (devDep) is needed
    # at runtime by `npm run worker`. `install-aws-iam-authenticator.sh`
    # drops the EKS exec-plugin binary at ./bin/aws-iam-authenticator;
    # the startCommand below prepends ./bin to PATH.
    buildCommand: bash bin/install-aws-iam-authenticator.sh && npm ci --include=dev && npx prisma generate
    startCommand: |
      set -e
      export PATH="$PWD/bin:$PATH"
      if [ -n "$KUBE_CONFIG_B64" ]; then
        echo "$KUBE_CONFIG_B64" | base64 -d > /tmp/kubeconfig
        export KUBECONFIG=/tmp/kubeconfig
      fi
      npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: litellm-agents-postgres
          property: connectionString
      - key: MASTER_KEY
        fromService:
          type: web
          name: litellm-agents-web
          envVarKey: MASTER_KEY
      - key: UI_USERNAME
        value: admin
      - key: LITELLM_API_BASE
        sync: false
      - key: LITELLM_API_KEY
        sync: false
      - key: LITELLM_DEFAULT_MODEL
        value: anthropic/claude-sonnet-4-6
      - key: PREINSTALLED_GITHUB_REPO
        value: https://github.com/BerriAI/litellm
      # See web service comment — kubeconfig uses aws-iam-authenticator at
      # request time, so AWS_* are mandatory for the exec-plugin to auth.
      - key: KUBE_CONFIG_B64
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        sync: false
      - key: K8S_NODE_HOST
        value: auto
      - key: K8S_HARNESS_IMAGE
        sync: false
      - key: K8S_NAMESPACE
        value: default
      - key: K8S_NODEPORT_MIN
        value: "30000"
      - key: K8S_NODEPORT_MAX
        value: "30099"
      - key: K8S_IMAGE_PULL_POLICY
        value: IfNotPresent
      - key: WARM_POOL_SIZE
        value: "2"
