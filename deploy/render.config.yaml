# Hosted deploy config (e.g. Render).
#
# Provider API keys are NOT stored here. They live in the database, added via
# the Settings UI (/settings -> POST /api/providers/{id}) and encrypted with the
# master key. credential_overrides injects them per request.
#
# A database is required: it backs provider credentials AND the sessions/agents
# UI. Without DATABASE_URL the server returns 503 "database is not configured"
# on those routes.
#
# NOTE: the gateway supports exactly one "provider/*" wildcard route (reserved
# for anthropic). OpenAI models are listed explicitly so Codex can use the
# OpenAI Responses API without adding a second wildcard route. Provider API
# keys are loaded from the database at request time.
model_list:
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*
      api_base: https://api.anthropic.com

  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_base: https://api.openai.com

  - model_name: gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_base: https://api.openai.com

  - model_name: gpt-4.1-mini
    litellm_params:
      model: openai/gpt-4.1-mini
      api_base: https://api.openai.com

  - model_name: gemini-3.5-flash
    litellm_params:
      model: gemini_chat/gemini-3.5-flash
      api_base: https://generativelanguage.googleapis.com/v1beta/openai

  - model_name: mistral-small-latest
    litellm_params:
      model: mistral/mistral-small-latest
      api_base: https://api.mistral.ai/v1

  - model_name: cerebras-gpt-oss-120b
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_base: https://api.cerebras.ai/v1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
