services:
  postgres:
    image: postgres:16-alpine
    container_name: litellm-agents-postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm_agents"]
      interval: 2s
      timeout: 2s
      retries: 30

  # One-shot: push the Prisma schema to Postgres before web/worker start.
  db-migrate:
    build:
      context: .
      target: prisma
    env_file: .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm_agents
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      # Buildkit defaults to the last stage of a multi-stage Dockerfile.
      # The Dockerfile's last stage is `worker`, so without an explicit
      # target the web container ends up running the reconciler. Pin to
      # `runner` (the Next.js standalone server stage).
      target: runner
    ports:
      - "3002:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm_agents
      # Inside the container, kubeconfig server URLs that point at 127.0.0.1
      # (kind's default) need to be rewritten to host.docker.internal so the
      # web process can reach the kind API server on the host. The KUBECONFIG
      # var below points at the rewritten copy produced at startup; if absent,
      # client-node falls back to ~/.kube/config which the host's IP won't be
      # reachable from inside compose.
      KUBECONFIG: /root/.kube/config
    # host.docker.internal is automatic on Docker Desktop but needs the
    # explicit gateway alias on Linux (and is harmless on macOS/Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only mount of the host kubeconfig so @kubernetes/client-node can
      # find a cluster. For kind clusters created by bin/kind-up.sh, the
      # apiserver is pinned at host.docker.internal:6444 so this works from
      # inside the compose network as long as K8S_API_SERVER overrides the
      # kubeconfig server URL accordingly.
      - ${HOME}/.kube:/root/.kube:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://litellm:litellm@postgres:5432/litellm_agents
      KUBECONFIG: /root/.kube/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
