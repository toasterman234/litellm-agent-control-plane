# Test SandboxClaim — validates warm pool binding works end-to-end.
#
# Usage:
#   # Measure time-to-Bound (should be sub-second if pool has readyReplicas > 0)
#   time kubectl apply -f k8s/test-sandbox-claim.yaml
#   kubectl wait sandboxclaim/test-claim-001 --for=condition=Bound --timeout=60s
#   kubectl get sandboxclaim test-claim-001 -o jsonpath='{.status.sandbox}'
#
#   # Clean up
#   kubectl delete -f k8s/test-sandbox-claim.yaml
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxClaim
metadata:
  name: test-claim-001
  namespace: default
spec:
  sandboxTemplateRef:
    name: claude-agent-sdk
  warmpool: pool-214ec20b   # claim from the Security PR Scanner pool
  lifecycle:
    shutdownPolicy: Delete
  env:
  - name: SESSION_ID
    value: "test-session-001"
  - name: AGENT_ID
    value: "214ec20b-4213-485a-a499-a206881b1891"
