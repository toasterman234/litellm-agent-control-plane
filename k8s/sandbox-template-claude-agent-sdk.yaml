# SandboxTemplate for the claude-agent-sdk harness.
#
# Mirrors the pod spec built by k8s.ts buildContainerEnv(). Static env vars
# are baked in here; per-session values (SESSION_ID, MEMORY_KEY, etc.) are
# injected by SandboxClaim.spec.env when envVarsInjectionPolicy: Allowed.
#
# Apply:
#   kubectl apply -f k8s/sandbox-template-claude-agent-sdk.yaml
#
# Override image/env for local dev:
#   kubectl apply -f - <<EOF
#   ... (copy this file, swap image to claude-agent-sdk-sandbox:dev)
#   EOF
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: claude-agent-sdk
  namespace: default
spec:
  # Allow SandboxClaim to inject/override env vars (needed for SESSION_ID,
  # AGENT_ID, REPO_URL which differ per session).
  envVarsInjectionPolicy: Allowed
  podTemplate:
    spec:
      restartPolicy: Never
      containers:
      - name: harness
        # Production ECR image — override for local dev
        image: 888602223428.dkr.ecr.us-east-1.amazonaws.com/litellm-agents-claude-sdk:fa805bd
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4096
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        env:
        - name: LITELLM_API_BASE
          value: "https://litellm-1-b64x.onrender.com/"
        - name: LITELLM_API_KEY
          value: "sk-GjX--WwRQmiX2cvASbKf5Q"
        - name: MODEL
          value: "anthropic/claude-sonnet-4-6"
