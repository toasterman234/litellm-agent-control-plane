# Fluent Bit DaemonSet — forwards harness pod logs to CloudWatch Logs.
#
# Log group: /eks/litellm-agents/harness
# Streams:   <namespace>/<pod-name>/<container-name>
#
# Filters to pods in the `default` namespace whose names start with `s-`
# (session sandboxes) or `w-` (warm-pool tasks). Platform pods (litellm-web,
# litellm-worker) are excluded — they already log to stdout visible via
# kubectl logs.

---
apiVersion: v1
kind: Namespace
metadata:
  name: amazon-cloudwatch
  labels:
    name: amazon-cloudwatch

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/logs", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: amazon-cloudwatch

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: amazon-cloudwatch
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # Tail container logs from harness pods (s-* and w-* in default namespace).
    [INPUT]
        Name              tail
        Tag               harness.*
        Path              /var/log/containers/*_default_harness-*.log
        Path_Key          filename
        DB                /var/fluent-bit/state/harness.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # Tail vault sidecar logs from the same pods.
    [INPUT]
        Name              tail
        Tag               vault.*
        Path              /var/log/containers/*_default_vault-*.log
        Path_Key          filename
        DB                /var/fluent-bit/state/vault.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # Enrich with k8s metadata (pod name, namespace, labels).
    [FILTER]
        Name                kubernetes
        Match               harness.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name                kubernetes
        Match               vault.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    # Only keep logs from s-* and w-* pods (harness sandboxes).
    [FILTER]
        Name    grep
        Match   harness.*
        Regex   kubernetes['pod_name'] ^[sw]-

    [FILTER]
        Name    grep
        Match   vault.*
        Regex   kubernetes['pod_name'] ^[sw]-

    [OUTPUT]
        Name                cloudwatch_logs
        Match               harness.*
        region              us-east-1
        log_group_name      /eks/litellm-agents/harness
        log_stream_prefix   harness/
        log_stream_template $kubernetes['pod_name']
        auto_create_group   false

    [OUTPUT]
        Name                cloudwatch_logs
        Match               vault.*
        region              us-east-1
        log_group_name      /eks/litellm-agents/harness
        log_stream_prefix   vault/
        log_stream_template $kubernetes['pod_name']
        auto_create_group   false

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: public.ecr.aws/aws-observability/aws-for-fluent-bit:stable
          imagePullPolicy: Always
          env:
            - name: AWS_REGION
              value: us-east-1
            - name: CLUSTER_NAME
              value: litellm-agents
          resources:
            limits:
              memory: 200Mi
            requests:
              cpu: 50m
              memory: 100Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
            - name: state
              mountPath: /var/fluent-bit/state
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
        - name: state
          hostPath:
            path: /var/fluent-bit/state
            type: DirectoryOrCreate
