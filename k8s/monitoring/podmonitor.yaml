# Prometheus scrape targets for litellm-agent-platform.
#
# Prerequisites:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false
#
# Then: kubectl apply -f k8s/monitoring/podmonitor.yaml

---
# Web pod — session spawn metrics, warm pool hit/miss, phase durations.
# Endpoint: GET /api/v1/metrics  port 10000 (named "http" in web.yaml)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: litellm-web
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: litellm-web
  podMetricsEndpoints:
    - port: http
      path: /api/v1/metrics
      interval: 30s
      scrapeTimeout: 10s

---
# Worker pod — reconciler counters, warm pool provision metrics.
# Endpoint: GET /metrics  port 9091 (named "metrics" in worker.yaml)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: litellm-worker
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: litellm-worker
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
