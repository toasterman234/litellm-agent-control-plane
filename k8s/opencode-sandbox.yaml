# =============================================================================
# EXAMPLE ONLY — DO NOT APPLY DIRECTLY
# =============================================================================
# This is a hand-written reference manifest used to exercise the agent-sandbox
# CRD by hand during local development. The values below (LITELLM_API_BASE
# pointing at localhost:9999, LITELLM_API_KEY="stub", a public Hello-World
# repo) are stubs — the harness container will start but every LLM call
# will fail against a non-existent server.
#
# The platform never applies this file. `bin/kind-up.sh` does not reference
# it; runtime Sandbox CRs are produced by `src/server/k8s.ts::runTask`.
#
# If you want to smoke-test the controller in a kind cluster, replace the
# LITELLM_* values with a real endpoint + key first, or use the platform's
# /sessions API which fills them from .env.
# =============================================================================
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: opencode-test
  namespace: default
spec:
  podTemplate:
    spec:
      restartPolicy: Never
      containers:
        - name: harness
          image: opencode-sandbox:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 4096
          env:
            - name: PORT
              value: "4096"
            - name: LITELLM_API_BASE
              value: "http://localhost:9999"
            - name: LITELLM_API_KEY
              value: "stub"
            - name: LITELLM_DEFAULT_MODEL
              value: "gpt-4o-mini"
            - name: BRANCH
              value: "master"
            - name: REPO_URL
              value: "https://github.com/octocat/Hello-World.git"
            - name: AGENT_PROMPT
              value: "you are a sandbox"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
