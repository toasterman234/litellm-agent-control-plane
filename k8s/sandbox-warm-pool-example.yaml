# Example SandboxWarmPool — one per agent.
#
# Name convention: pool-<first-8-chars-of-agent-id>
# Replicas: start low (2) while validating, raise to match WARM_POOL_SIZE later.
#
# Apply per-agent (substitute agent_id):
#   kubectl apply -f k8s/sandbox-warm-pool-example.yaml
#
# Watch pool fill:
#   kubectl get sandboxwarmpool -w
#   kubectl get sandboxes -l agents.x-k8s.io/warm-pool=pool-<agent_id>
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: pool-214ec20b   # Security PR Scanner agent
  namespace: default
spec:
  replicas: 2
  sandboxTemplateRef:
    name: claude-agent-sdk
  updateStrategy:
    # OnReplenish: replace warm pods with updated template only when
    # they are claimed (not all at once). Avoids disrupting existing warm pods.
    type: OnReplenish
