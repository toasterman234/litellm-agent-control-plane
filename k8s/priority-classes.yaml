# PriorityClasses for agent sandbox pods.
#
# sandbox-active (high): assigned to session pods — real user traffic.
# sandbox-warm   (low):  assigned to warm pool pods — pre-provisioned but idle.
#
# When the cluster is under memory pressure and a sandbox-active pod cannot
# schedule, the Kubernetes preemption mechanism evicts sandbox-warm pods
# (lowest-priority) to make room. This means warm pool pods are automatically
# drained under load without any application-level pressure detection.
#
# Apply once per cluster:
#   kubectl apply -f k8s/priority-classes.yaml
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: sandbox-active
value: 1000
globalDefault: false
description: "Active session sandbox pods — preempt warm pods under pressure."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: sandbox-warm
value: 100
globalDefault: false
description: "Warm pool sandbox pods — low priority, evicted first under pressure."
