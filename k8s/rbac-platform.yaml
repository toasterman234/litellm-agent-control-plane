# RBAC resources for the litellm-agent-platform.
#
# The platform pod (web + worker) needs:
#   - Namespaced access to Sandboxes, Services, Pods, and Pod logs
#     (all sandbox lifecycle operations live in one namespace)
#   - Cluster-wide read on Nodes (for ExternalIP / capacity discovery)
#     and DaemonSets (for warm-pool prepull status)
#
# Apply order: ServiceAccount → Secret → Role → RoleBinding →
#              ClusterRole → ClusterRoleBinding

---
# ServiceAccount the Deployment pods run as.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-platform
  namespace: default

---
# Long-lived token for the ServiceAccount (used by in-cluster auth).
# Kubernetes auto-populates `.data.token` once the SA exists.
apiVersion: v1
kind: Secret
metadata:
  name: litellm-platform-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: litellm-platform
type: kubernetes.io/service-account-token

---
# Namespaced permissions: sandbox CRDs, NodePort Services, and Pod inspection.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: litellm-platform
  namespace: default
rules:
  # Sandbox CRs (agents.x-k8s.io/v1alpha1)
  - apiGroups: ["agents.x-k8s.io"]
    resources: ["sandboxes"]
    verbs: ["create", "get", "list", "delete"]
  # NodePort Services created per session
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  # Pod state polling (sandbox bring-up, health checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Pod log tailing (session diagnose endpoint)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Exec into sandbox containers — required by execFilesIntoContainer in
  # src/server/k8s.ts to inject CreateAgentBody.sandbox_files into the
  # harness pod after it reaches Running. Without this verb the kubectl
  # exec returns Forbidden, the platform marks the session failed at
  # phase=injecting_files, and the pod logs show only a successful boot
  # with no obvious error (the underlying RBAC denial gets coerced to
  # "[object Object]" in failure_reason).
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Deployments — required by createInlineHarnessDeployment /
  # deleteInlineHarnessDeployment in src/server/k8s.ts. Without this the
  # admin "Enable" toggle returns 403 and the inline harness can never start.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "delete", "patch", "update"]

---
# Bind the Role to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: litellm-platform
  namespace: default
subjects:
  - kind: ServiceAccount
    name: litellm-platform
    namespace: default
roleRef:
  kind: Role
  name: litellm-platform
  apiGroup: rbac.authorization.k8s.io

---
# Cluster-wide read: Node discovery (ExternalIP / capacity) and
# DaemonSet status (harness image prepull health).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: litellm-platform-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "get"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get"]

---
# Bind the ClusterRole to the ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: litellm-platform-nodes
subjects:
  - kind: ServiceAccount
    name: litellm-platform
    namespace: default
roleRef:
  kind: ClusterRole
  name: litellm-platform-nodes
  apiGroup: rbac.authorization.k8s.io
